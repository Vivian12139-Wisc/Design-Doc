<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目名 - 原型图导航</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f6f8fa;
    color: #1f2328;
    padding: 48px 24px;
    min-height: 100vh;
  }
  .container { max-width: 880px; margin: 0 auto; }
  header { margin-bottom: 40px; }
  h1 { font-size: 32px; font-weight: 600; margin-bottom: 8px; }
  .subtitle { color: #656d76; font-size: 15px; }
  .meta {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 10px;
    background: #ddf4ff;
    color: #0969da;
    border-radius: 12px;
    font-size: 12px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #656d76;
    margin: 32px 0 12px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 8px;
    padding: 20px;
    text-decoration: none;
    color: inherit;
    transition: all 0.15s ease;
    display: block;
  }
  .card:hover {
    border-color: #0969da;
    box-shadow: 0 3px 8px rgba(9, 105, 218, 0.12);
    transform: translateY(-1px);
  }
  .card-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #0969da;
  }
  .card-desc { font-size: 13px; color: #656d76; line-height: 1.5; }
  .card-tag {
    display: inline-block;
    margin-top: 10px;
    font-size: 11px;
    padding: 2px 8px;
    background: #f6f8fa;
    border: 1px solid #d0d7de;
    border-radius: 10px;
    color: #656d76;
  }
  footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid #d0d7de;
    font-size: 13px;
    color: #656d76;
  }
  footer a { color: #0969da; text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📐 项目名</h1>
      <p class="subtitle">项目一句话说明,例如:XX 系统原型图与交互设计稿</p>
      <span class="meta">最后更新:2026-04-23</span>
    </header>

    <div class="section-title">评分端</div>
    <div class="grid">
      <a class="card" href="./zip_and_upload_log.html">
        <div class="card-title">上传日志页面</div>
        <div class="card-desc">文件打包与上传记录界面</div>
        <span class="card-tag">v1.0</span>
      </a>
      <!-- 复制上面这段 <a class="card"> ... </a> 来新增卡片 -->
    </div>

    <div class="section-title">管理端</div>
    <div class="grid">
      <a class="card" href="./example.html">
        <div class="card-title">示例页面</div>
        <div class="card-desc">简单描述这个页面是做什么的</div>
        <span class="card-tag">待开发</span>
      </a>
    </div>

    <footer>
      返回 <a href="../">← 所有项目</a> ·
      <a href="https://github.com/Vivian12139-Wisc/Design-Doc">GitHub 仓库</a>
    </footer>
  </div>
</body>
</html>
